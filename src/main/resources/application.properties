server.port=8081

# SQLite database path
spring.datasource.url=jdbc:sqlite:data/mf_analytics.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# Disable JPA auto-ddl (we manage schema manually)
spring.jpa.hibernate.ddl-auto=none

# Logging
logging.level.com.mutualfund=INFO
logging.level.root=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

# mfapi.in base URL
mfapi.base-url=https://api.mfapi.in/mf
mfapi.timeout-seconds=30

# Rate limiter config (matches mfapi.in limits exactly)
ratelimiter.per-second=2
ratelimiter.per-minute=50
ratelimiter.per-hour=300
ratelimiter.state-file=data/ratelimiter_state.json

# Pipeline config
pipeline.workers=2
pipeline.recent-sync-hours=12

# Cache TTL in minutes
cache.ttl-minutes=60

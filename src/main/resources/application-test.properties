# Test profile: use in-memory SQLite
spring.datasource.url=jdbc:sqlite::memory:
spring.datasource.driver-class-name=org.sqlite.JDBC

ratelimiter.per-second=2
ratelimiter.per-minute=50
ratelimiter.per-hour=300
ratelimiter.state-file=/tmp/rl_test_state.json

cache.ttl-minutes=60
pipeline.workers=2
pipeline.recent-sync-hours=12
mfapi.base-url=https://api.mfapi.in/mf
mfapi.timeout-seconds=30
